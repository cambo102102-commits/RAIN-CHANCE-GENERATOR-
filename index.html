<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rain Chance Generator</title>

<style>
@font-face {
  font-family: "BraveHearted";
  src: url("fonts/BraveHearted.ttf");
}

@font-face {
  font-family: "Emery";
  src: url("fonts/Emery.ttf");
}

:root {
  --green: #39ff4a;
  --bg: #020202;
  --panel: #08090c;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #000;
  color: var(--green);
  font-family: Arial, sans-serif;
}

.rain-widget {
  width: min(1100px, 94vw);
  margin: 40px auto;
  background: var(--panel);
  padding: 28px 42px 34px;
  border: 1px solid #111;
  position: relative;
}

.top-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.logo {
  width: 170px;
  cursor: pointer;
  transition: transform 0.2s ease;
}

.logo:hover {
  transform: scale(1.05);
}

.search-box {
  display: flex;
  align-items: center;
  border: 4px solid var(--green);
  width: 380px;
  height: 54px;
}

.search-box input {
  flex: 1;
  height: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: var(--green);
  text-align: center;
  font-size: 16px;
  text-transform: uppercase;
}

.search-box input::placeholder {
  color: var(--green);
  opacity: 0.9;
}

.search-box button {
  width: 62px;
  height: 100%;
  border: none;
  background: transparent;
  color: var(--green);
  font-size: 30px;
  cursor: pointer;
}

.title {
  text-align: center;
  font-family: "BraveHearted", Arial, sans-serif;
  font-size: clamp(32px, 5vw, 56px);
  letter-spacing: 14px;
  font-weight: normal;
  margin: 25px 0 70px;
  text-transform: uppercase;
  -webkit-text-stroke: 1px var(--green);
  color: transparent;
}

.chart {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  align-items: end;
  gap: 45px;
  min-height: 390px;
}

.day-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
}

.percent {
  font-family: Arial, sans-serif;
  font-size: clamp(24px, 3vw, 36px);
  letter-spacing: 9px;
  margin-bottom: 8px;
}

.bar-wrap {
  height: 260px;
  width: 86px;
  display: flex;
  align-items: flex-end;
}

.bar {
  width: 100%;
  height: 0%;
  background: var(--green);
  transition: height 0.8s ease;
}

.day {
  font-family: "Emery", Arial, sans-serif;
  font-size: clamp(34px, 5vw, 52px);
  margin-top: 18px;
  letter-spacing: 4px;
}

.status {
  text-align: center;
  margin-top: 22px;
  font-size: 14px;
  color: var(--green);
  opacity: 0.8;
}

@media (max-width: 760px) {
  .rain-widget {
    padding: 22px 18px 28px;
  }

  .top-row {
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .logo {
    width: 130px;
  }

  .search-box {
    width: 100%;
    max-width: 360px;
  }

  .title {
    letter-spacing: 7px;
    margin-bottom: 45px;
  }

  .chart {
    gap: 15px;
  }

  .bar-wrap {
    width: 50px;
    height: 210px;
  }

  .percent {
    letter-spacing: 4px;
  }
}
</style>
</head>

<body>

<div class="rain-widget">
  <div class="top-row">
    <img src="logo.png" class="logo" id="refreshLogo" alt="Logo" />

    <form class="search-box" id="searchForm">
      <input id="locationInput" placeholder="SEARCH LOCATION HERE" />
      <button type="submit">⌕</button>
    </form>
  </div>

  <h1 class="title">Rain Chance Generator</h1>

  <div class="chart" id="chart"></div>

  <div class="status" id="status">Finding your location...</div>
</div>

<script>
const chart = document.getElementById("chart");
const statusBox = document.getElementById("status");
let currentCoords = null;

const dayNames = ["SUN", "MON", "TUE", "WED", "THR", "FRI", "SAT"];

function getNextFiveDays() {
  const now = new Date();
  const days = [];

  for (let i = 0; i < 5; i++) {
    const d = new Date(now);
    d.setDate(now.getDate() + i);
    days.push({
      label: dayNames[d.getDay()],
      date: d
    });
  }

  return days;
}

function renderChart(percentages) {
  const days = getNextFiveDays();
  chart.innerHTML = "";

  days.forEach((day, i) => {
    const chance = percentages[i] ?? 0;

    const card = document.createElement("div");
    card.className = "day-card";

    card.innerHTML = `
      <div class="percent">${chance}%</div>
      <div class="bar-wrap">
        <div class="bar" style="height:${chance}%"></div>
      </div>
      <div class="day">${day.label}</div>
    `;

    chart.appendChild(card);
  });
}

async function getCoordsFromSearch(query) {
  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`;
  const res = await fetch(url);
  const data = await res.json();

  if (!data.length) {
    throw new Error("Location not found.");
  }

  return {
    lat: Number(data[0].lat),
    lon: Number(data[0].lon)
  };
}

async function getNWSRainChances(lat, lon) {
  const pointRes = await fetch(`https://api.weather.gov/points/${lat},${lon}`);
  const pointData = await pointRes.json();

  const forecastUrl = pointData.properties.forecast;
  const forecastRes = await fetch(forecastUrl);
  const forecastData = await forecastRes.json();

  const periods = forecastData.properties.periods;
  const daily = [];

  for (const period of periods) {
    if (daily.length >= 5) break;

    const pop = period.probabilityOfPrecipitation?.value;

    if (period.isDaytime && pop !== null && pop !== undefined) {
      daily.push(pop);
    }
  }

  while (daily.length < 5) daily.push(0);

  return daily;
}

/*
  MODEL DATA PLACEHOLDER

  Direct HRRR/RAP/NAM/GFS/ECMWF/GEFS/ICON/CMC data usually cannot be safely
  pulled straight from a browser because of CORS, file size, GRIB2 decoding,
  and API restrictions.

  Best setup:
  1. Create a backend endpoint like:
     /api/rain-probability?lat=33.75&lon=-84.39
  2. Backend downloads latest model runs.
  3. Backend calculates rain chance.
  4. This frontend displays the final percentages.

  This function is where your backend model blend would connect.
*/

async function getModelRainChances(lat, lon) {
  try {
    const response = await fetch(`/api/rain-probability?lat=${lat}&lon=${lon}`);

    if (!response.ok) throw new Error("Model data unavailable.");

    const data = await response.json();

    return data.probabilities;
  } catch {
    return null;
  }
}

async function updateRainChances(coords) {
  try {
    currentCoords = coords;
    statusBox.textContent = "Calculating rain chances...";

    let rainChances = await getModelRainChances(coords.lat, coords.lon);

    if (!rainChances) {
      statusBox.textContent = "Using NWS & Model data for rain probabilities.";
      rainChances = await getNWSRainChances(coords.lat, coords.lon);
    } else {
      statusBox.textContent = "Using latest available model blend.";
    }

    renderChart(rainChances);
  } catch (err) {
    statusBox.textContent = "Unable to load rain chances for this location.";
    renderChart([0, 0, 0, 0, 0]);
  }
}

function useDeviceLocation() {
  if (!navigator.geolocation) {
    statusBox.textContent = "Device location not supported. Search a city or ZIP.";
    renderChart([0, 0, 0, 0, 0]);
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      updateRainChances({
        lat: pos.coords.latitude,
        lon: pos.coords.longitude
      });
    },
    () => {
      statusBox.textContent = "Location denied. Search a city or ZIP.";
      renderChart([0, 0, 0, 0, 0]);
    }
  );
}

document.getElementById("searchForm").addEventListener("submit", async e => {
  e.preventDefault();

  const query = document.getElementById("locationInput").value.trim();

  if (!query) return;

  try {
    statusBox.textContent = "Searching location...";
    const coords = await getCoordsFromSearch(query);
    updateRainChances(coords);
  } catch {
    statusBox.textContent = "Location not found.";
  }
});

document.getElementById("refreshLogo").addEventListener("click", () => {
  if (currentCoords) {
    updateRainChances(currentCoords);
  } else {
    useDeviceLocation();
  }
});

renderChart([30, 40, 20, 60, 50]);
useDeviceLocation();
</script>

</body>
</html>
